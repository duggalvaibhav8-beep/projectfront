apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dev
  template:
    metadata:
      labels:
        app: dev
        
    spec:
      containers:
      - name: dev
        image: duggal:latest     
        imagePullPolicy: Never   
        ports:
        - containerPort: 4200

