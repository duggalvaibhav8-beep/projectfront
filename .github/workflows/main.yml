name: next git

on:
  push:
    branches: ['main']

jobs:
  run-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with: 
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: | 
            cd /home/ubuntu/projectfront

            git pull origin main 

            npm install
            npm run build || true
            npm i -g http-server pm2 
            pm2 delete vaibhav || true
            pm2 start http-server /home/ubuntu/projectfront/dist/projectfront --name vaibhav -- -p 4200  
          
        

