name: next git

on:
  push:
    branches: ['main']

jobs:
  run-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with: 
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: | 
            cd /home/ubuntu/projectfront

            git pull origin main 

            sudo npm install
            sudo npm run build || true
            sudo npm i pm2 -g 
            sudo npm i http-server -g
            pm2 delete vaibhav || true
            sudo pm2 start http-server --name vaibhav -- -p 4200 -d false 
          
        

