name: next git docker

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/projectfront

            # update latest code
            git pull origin main

            # build docker image
            docker build -t best .

            # stop old container
            docker stop projectfront || true
            docker rm projectfront || true

            # run new container
            docker run -d -p 4200:4200 best
